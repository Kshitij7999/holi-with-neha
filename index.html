<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Holi </title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700;800;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet" />

  <!-- Vue 3 -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <!-- Anime.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
  <!-- canvas-confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; }

    body {
      font-family: 'Poppins', sans-serif;
      background: #1a0533;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% 0%,   rgba(255,80,180,.28) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 0%  60%,   rgba(255,200,0,.22)  0%, transparent 65%),
        radial-gradient(ellipse 60% 40% at 100% 55%,  rgba(0,220,255,.20)  0%, transparent 65%),
        radial-gradient(ellipse 50% 50% at 50% 100%,  rgba(255,60,120,.25) 0%, transparent 60%),
        url("https://images.unsplash.com/photo-1615485290382-441e4d049cb5?auto=format&fit=crop&w=1920&q=80");
      background-size: cover;
      background-position: center;
      background-blend-mode: normal, normal, normal, normal, multiply;
      cursor: none;
    }

    .powder-layer {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 55% 35% at 10%  20%,  rgba(255,80,0,.35)   0%, transparent 70%),
        radial-gradient(ellipse 45% 30% at 88%  15%,  rgba(0,200,255,.30)  0%, transparent 70%),
        radial-gradient(ellipse 50% 30% at 50%  85%,  rgba(255,200,0,.32)  0%, transparent 70%),
        radial-gradient(ellipse 40% 28% at 20%  75%,  rgba(200,0,255,.28)  0%, transparent 70%),
        radial-gradient(ellipse 42% 28% at 78%  72%,  rgba(0,255,120,.25)  0%, transparent 70%);
      animation: powderDrift 12s ease-in-out infinite alternate;
    }
    @keyframes powderDrift {
      0%   { transform: scale(1)    rotate(0deg);  opacity: 1; }
      50%  { transform: scale(1.06) rotate(1deg);  opacity: .85; }
      100% { transform: scale(.97)  rotate(-1deg); opacity: 1; }
    }

    .vignette {
      position: fixed; inset: 0; pointer-events: none; z-index: 1;
      background: radial-gradient(ellipse 85% 85% at 50% 50%, transparent 35%, rgba(10,0,20,.78) 100%);
    }

    #cur-dot {
      position: fixed; width: 12px; height: 12px;
      background: #fff; border-radius: 50%;
      pointer-events: none; z-index: 9999;
      transform: translate(-50%,-50%);
      mix-blend-mode: difference;
    }
    #cur-ring {
      position: fixed; width: 42px; height: 42px;
      border: 2px solid rgba(255,255,255,.55);
      border-radius: 50%;
      pointer-events: none; z-index: 9998;
      transform: translate(-50%,-50%);
    }

    #splash-canvas {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 2;
    }

    #app {
      position: relative; z-index: 3;
      width: 100vw; height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      padding: 1rem;
    }

    .blob {
      position: fixed; border-radius: 50%;
      filter: blur(90px); pointer-events: none; z-index: 0;
      mix-blend-mode: screen;
    }
    .blob-1 { width:420px;height:420px; background:rgba(255,60,140,.55);  top:-80px;   left:-100px; animation: blobMove1 9s  ease-in-out infinite; }
    .blob-2 { width:360px;height:360px; background:rgba(0,220,255,.45);   top:-60px;   right:-80px; animation: blobMove2 11s ease-in-out infinite; }
    .blob-3 { width:380px;height:380px; background:rgba(255,190,0,.45);   bottom:-90px; left:5%;    animation: blobMove3 10s ease-in-out infinite; }
    .blob-4 { width:340px;height:340px; background:rgba(160,0,255,.45);   bottom:-70px; right:5%;   animation: blobMove2 13s ease-in-out infinite reverse; }
    .blob-5 { width:280px;height:280px; background:rgba(0,255,120,.35);   top:40%;  left:42%;       animation: blobMove1 8s  ease-in-out infinite reverse; }

    @keyframes blobMove1 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(50px,-60px)  scale(1.12)} }
    @keyframes blobMove2 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-55px,40px) scale(1.08)} }
    @keyframes blobMove3 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(40px,-40px) scale(1.1)}  }

    .petal {
      position: fixed; font-size: 1.6rem;
      pointer-events: none; z-index: 4;
      user-select: none; will-change: transform, opacity;
    }

    .top-label {
      font-size: clamp(.8rem, 1.8vw, 1rem);
      font-weight: 600; letter-spacing: .35em;
      text-transform: uppercase;
      color: rgba(255,255,255,.80);
      opacity: 0; margin-bottom: .4rem;
      text-shadow: 0 0 20px rgba(255,200,0,.9);
    }

    .holi-title {
      font-family: 'Baloo 2', cursive;
      font-size: clamp(4rem, 13vw, 10.5rem);
      font-weight: 900; line-height: 1;
      letter-spacing: -.02em;
      background: linear-gradient(135deg,#ff2d78 0%,#ff8c00 18%,#ffe000 35%,#00e676 52%,#00cfff 68%,#a259ff 84%,#ff2d78 100%);
      background-size: 300% 300%;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      animation: rainbowShift 4s linear infinite;
      filter: drop-shadow(0 0 40px rgba(255,100,200,.7));
      opacity: 0;
    }
    @keyframes rainbowShift {
      0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%}
    }
    .letter { display: inline-block; will-change: transform; }

    .tagline {
      font-size: clamp(.9rem, 2vw, 1.25rem);
      font-weight: 300; color: rgba(255,255,255,.88);
      letter-spacing: .08em; opacity: 0;
      text-shadow: 0 2px 18px rgba(0,0,0,.6);
      margin-top: .6rem;
    }

    .color-dots {
      display: flex; gap: 1rem; margin-top: 1.4rem;
      justify-content: center; opacity: 0;
    }
    .cdot {
      width: 22px; height: 22px; border-radius: 50%;
      cursor: pointer; box-shadow: 0 0 18px currentColor;
      transition: transform .2s; border: 2px solid rgba(255,255,255,.3);
    }
    .cdot:hover { transform: scale(1.55); }

    .burst-btn {
      margin-top: 1.8rem;
      padding: .75rem 2.5rem;
      border: none; border-radius: 100px;
      font-family: 'Baloo 2', cursive;
      font-size: 1.1rem; font-weight: 800; letter-spacing: .04em;
      cursor: pointer;
      background: linear-gradient(135deg, #ff2d78, #ff8c00, #ffe000);
      color: #fff;
      box-shadow: 0 6px 40px rgba(255,80,0,.55);
      opacity: 0; transition: transform .2s, box-shadow .2s;
      animation: btnPulse 2s ease-in-out infinite;
    }
    .burst-btn:hover { transform: scale(1.08); box-shadow: 0 10px 60px rgba(255,200,0,.8); }
    @keyframes btnPulse {
      0%,100%{ box-shadow:0 6px 40px rgba(255,80,0,.55); }
      50%    { box-shadow:0 6px 60px rgba(255,200,0,.9); }
    }

    .spray-word {
      position: fixed;
      font-family: 'Baloo 2', cursive; font-weight: 900;
      pointer-events: none; z-index: 10; white-space: nowrap;
      will-change: transform, opacity;
      text-shadow: 0 2px 12px rgba(0,0,0,.4);
    }

    .hint {
      font-size: .75rem; letter-spacing: .12em; text-transform: uppercase;
      color: rgba(255,255,255,.4); margin-top: 1rem; opacity: 0;
    }

    @media (max-width: 480px) {
      .holi-title { font-size: clamp(3rem, 17vw, 5.5rem); }
    }
  </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>
<div class="blob blob-4"></div>
<div class="blob blob-5"></div>
<div class="powder-layer"></div>
<div class="vignette"></div>
<canvas id="splash-canvas"></canvas>
<div id="cur-dot"></div>
<div id="cur-ring"></div>

<div id="app">
  <span
    v-for="p in petals" :key="p.id"
    class="petal" :id="'petal-' + p.id"
    :style="{ left: p.x + 'vw', top: p.y + 'vh', fontSize: p.size + 'rem' }"
  >{{ p.emoji }}</span>

  <span
    v-for="w in sprayWords" :key="w.id"
    class="spray-word" :id="'sw-' + w.id"
    :style="{ left: w.x + 'px', top: w.y + 'px', color: w.color, fontSize: w.fs + 'rem' }"
  >{{ w.text }}</span>

  <p class="top-label" id="top-label"> Festival of Colours 2026 </p>

  <h1 class="holi-title" id="holi-title">
    <span v-for="(ch, i) in titleChars" :key="i" class="letter" :id="'ltr-' + i">{{ ch }}</span>
  </h1>

  <p class="tagline" id="tagline">Spread joy &nbsp;&nbsp; Splash colour &nbsp;&nbsp; Celebrate life </p>

  <div class="color-dots" id="cdots">
    <div class="cdot" v-for="c in dotColors" :key="c"
      :style="{ background: c, color: c }"
      @click="splashBurst(c)">
    </div>
  </div>

  <button class="burst-btn" id="burst-btn" @click="bigBurst"> Throw Colours!</button>

  <p class="hint" id="hint">Click anywhere on screen to splash colour</p>
</div>

<script>
const { createApp, ref, onMounted } = Vue;

createApp({
  setup() {
    const titleChars = [...'Happy Holi'];

    const dotColors = ['#ff2d78','#ff8c00','#ffe000','#00e676','#00cfff','#a259ff','#ff6ec7'];

    const petalEmojis = ['🌸','🌺','🌼','🎊','✨','🌈','💛','💜','💚','💙','❤️','🟡','🟠','🟣','🟢','🔵','🔴'];
    const petals = ref([]);
    const sprayWords = ref([]);
    let sprayId = 0;

    function buildPetals() {
      petals.value = Array.from({ length: 30 }, (_, i) => ({
        id: i,
        emoji: petalEmojis[i % petalEmojis.length],
        x: Math.random() * 100,
        y: Math.random() * 100,
        size: .8 + Math.random() * 1.4,
      }));
    }

    const holiWords = ['Holi!','Rang!','Gulal!','Joy!','🎨','✨','❤️‍🔥','रंग','होली','Love!','Colour!','Play!','Bura na mano!'];
    const wordColors = ['#ff2d78','#ff8c00','#ffe000','#00e676','#00cfff','#a259ff','#ff6ec7','#ff4444','#00ffcc'];

    function spawnWord(x, y) {
      const id = ++sprayId;
      sprayWords.value.push({
        id, text: holiWords[Math.floor(Math.random() * holiWords.length)],
        color: wordColors[Math.floor(Math.random() * wordColors.length)],
        x, y, fs: .8 + Math.random() * 1.6,
      });
      requestAnimationFrame(() => {
        const el = document.getElementById('sw-' + id);
        if (!el) return;
        anime({
          targets: el,
          translateX: (Math.random()-.5)*220,
          translateY: -(60 + Math.random()*150),
          opacity: [1, 0],
          scale: [.5, 1.4, .9],
          rotate: [(Math.random()-.5)*35],
          duration: 1100 + Math.random()*600,
          easing: 'easeOutExpo',
          complete: () => { sprayWords.value = sprayWords.value.filter(w => w.id !== id); },
        });
      });
    }

    let canvas, ctx;
    function initCanvas() {
      canvas = document.getElementById('splash-canvas');
      ctx = canvas.getContext('2d');
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);
    }
    function resizeCanvas() {
      canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    }

    function paintSplash(x, y, color) {
      const r = 16 + Math.random()*36;
      const g = ctx.createRadialGradient(x,y,0,x,y,r);
      g.addColorStop(0, color+'cc'); g.addColorStop(1, color+'00');
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
      ctx.fillStyle = g; ctx.fill();
      for (let i=0;i<8;i++) {
        const a=Math.random()*Math.PI*2, d=4+Math.random()*r*.95, sr=2+Math.random()*10;
        ctx.beginPath();
        ctx.arc(x+Math.cos(a)*d, y+Math.sin(a)*d, sr, 0, Math.PI*2);
        ctx.fillStyle = color+'88'; ctx.fill();
      }
      setTimeout(fadeCanvas, 5000);
    }

    function fadeCanvas() {
      let n=0;
      const id = setInterval(()=>{ ctx.fillStyle='rgba(0,0,0,0.012)'; ctx.fillRect(0,0,canvas.width,canvas.height); if(++n>80)clearInterval(id); },60);
    }

    function confettiPop(ox, oy, color) {
      confetti({ particleCount:65, spread:100, angle:80, origin:{x:ox,y:oy}, colors:[color,'#ffffff','#ffe000'], scalar:1.1 });
    }

    function fullConfetti() {
      const holiC = ['#ff2d78','#ff8c00','#ffe000','#00e676','#00cfff','#a259ff','#ff6ec7'];
      const end = Date.now()+2400;
      (function frame(){
        confetti({particleCount:8, angle:60,  spread:55, origin:{x:0,  y:.6}, colors:holiC});
        confetti({particleCount:8, angle:120, spread:55, origin:{x:1,  y:.6}, colors:holiC});
        confetti({particleCount:5, angle:90,  spread:70, origin:{x:.5, y:.2}, colors:holiC});
        if(Date.now()<end) requestAnimationFrame(frame);
      })();
    }

    function splashBurst(color) {
      const x = window.innerWidth*(.2+Math.random()*.6);
      const y = window.innerHeight*(.2+Math.random()*.6);
      for(let i=0;i<6;i++) setTimeout(()=>paintSplash(x+(Math.random()-.5)*90,y+(Math.random()-.5)*90,color),i*55);
      spawnWord(x, y-30);
      confettiPop(x/window.innerWidth, y/window.innerHeight, color);
    }

    function bigBurst() {
      for(let i=0;i<24;i++) setTimeout(()=>{
        const x=Math.random()*window.innerWidth, y=Math.random()*window.innerHeight;
        paintSplash(x,y,dotColors[Math.floor(Math.random()*dotColors.length)]);
      }, i*50);
      const cx=window.innerWidth/2, cy=window.innerHeight/2;
      for(let i=0;i<14;i++) setTimeout(()=>spawnWord(cx+(Math.random()-.5)*440,cy+(Math.random()-.5)*260),i*75);
      fullConfetti();
      jiggleTitleLetters();
    }

    function jiggleTitleLetters() {
      titleChars.forEach((_,i)=>{
        const el=document.getElementById('ltr-'+i); if(!el) return;
        anime({ targets:el, translateY:[0,-(28+Math.random()*22),0], rotate:[0,(Math.random()-.5)*25,0], scale:[1,1.4,1],
          duration:700+Math.random()*300, delay:i*55, easing:'spring(1,80,10,0)' });
      });
    }

    function animatePetals() {
      petals.value.forEach((p,i)=>{
        const el=document.getElementById('petal-'+p.id); if(!el) return;
        anime({ targets:el,
          translateY:[{value:-(18+Math.random()*24),duration:1800+Math.random()*1200},{value:0,duration:1800+Math.random()*1200}],
          translateX:[{value:(Math.random()-.5)*32,duration:2200+Math.random()*1000},{value:0,duration:2200+Math.random()*1000}],
          rotate:{value:'+=360', duration:8000+Math.random()*8000, easing:'linear'},
          opacity:[.25,.85,.25],
          loop:true, delay:Math.random()*3000, easing:'easeInOutSine', direction:'alternate',
        });
      });
    }

    function startLetterFloat() {
      titleChars.forEach((_,i)=>{
        const el=document.getElementById('ltr-'+i); if(!el) return;
        anime({ targets:el,
          translateY:[(Math.random()-.5)*8,-(8+Math.random()*14),(Math.random()-.5)*7],
          rotate:[(Math.random()-.5)*4,(Math.random()-.5)*7,0],
          loop:true, duration:2200+Math.random()*1600, delay:i*90, easing:'easeInOutSine', direction:'alternate',
        });
      });
    }

    function entranceAnims() {
      const tl = gsap.timeline({ defaults:{ease:'back.out(1.6)'} });
      tl.to('#top-label', { opacity:1, y:0, duration:.6, from:{y:-20} });
      tl.fromTo('.letter',
        { opacity:0, y:90, rotation:i=>(i%2===0?-22:22), scale:.3 },
        { opacity:1, y:0, rotation:0, scale:1, stagger:.07, duration:.75, ease:'back.out(2.2)' },
        '-=.2'
      );
      tl.to('#tagline',     { opacity:1, y:0, duration:.6, from:{y:20} }, '-=.15');
      tl.fromTo('#cdots .cdot', {opacity:0,scale:0}, {opacity:1,scale:1,stagger:.07,duration:.4,ease:'back.out(2)'}, '-=.2');
      tl.to('#burst-btn',   { opacity:1, duration:.5 }, '-=.1');
      tl.to('#hint',        { opacity:1, duration:.5 }, '-=.1');
      tl.call(()=>{ startLetterFloat(); animatePetals(); });
    }

    function initCursor() {
      const dot=document.getElementById('cur-dot'), ring=document.getElementById('cur-ring');
      let mx=0,my=0,rx=0,ry=0;
      window.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
      (function loop(){ rx+=(mx-rx)*.14; ry+=(my-ry)*.14;
        dot.style.left=mx+'px'; dot.style.top=my+'px';
        ring.style.left=rx+'px'; ring.style.top=ry+'px';
        requestAnimationFrame(loop); })();
    }

    function initClickSplash() {
      window.addEventListener('click',e=>{
        if(e.target.closest('button')||e.target.closest('.cdot')) return;
        const color=dotColors[Math.floor(Math.random()*dotColors.length)];
        for(let i=0;i<3;i++) setTimeout(()=>paintSplash(e.clientX+(Math.random()-.5)*45,e.clientY+(Math.random()-.5)*45,color),i*40);
        spawnWord(e.clientX, e.clientY-10);
        confettiPop(e.clientX/window.innerWidth, e.clientY/window.innerHeight, color);
      });
    }

    onMounted(()=>{
      buildPetals(); initCanvas(); initCursor(); initClickSplash();
      setTimeout(()=>{ entranceAnims(); setTimeout(fullConfetti,1600); }, 80);
    });

    return { titleChars, dotColors, petals, sprayWords, splashBurst, bigBurst };
  },
}).mount('#app');
</script>
</body>
</html>
